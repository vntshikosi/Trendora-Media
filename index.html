<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trendora Media | Secure Universal Checkout</title>
    <script src="https://js.paystack.co/v1/inline.js"></script>
    <style>
        :root {
            --bg: #060912;
            --accent: #4a90e2;
            --glass: rgba(255, 255, 255, 0.05);
            --text: #cbd5e0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        .checkout-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        h1 { color: white; margin-bottom: 8px; }
        .service-name { color: var(--accent); font-weight: bold; font-size: 1.2rem; }
        .price-tag { font-size: 3rem; color: white; font-weight: 800; margin: 20px 0; }

        .payment-methods-icons {
            display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; opacity: 0.7;
        }

        .pay-btn {
            background: white;
            color: var(--bg);
            border: none;
            padding: 18px;
            width: 100%;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .pay-btn:hover { background: var(--accent); color: white; transform: translateY(-2px); }

        .input-group { text-align: left; margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; font-size: 0.8rem; }
        input {
            width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155;
            background: #0f172a; color: white; box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div class="checkout-card">
        <h1>Trendora Media</h1>
        <p>Complete your project payment securely.</p>
        
        <div class="service-name" id="serviceName">Custom Creative Package</div>
        <div class="price-tag" id="totalDisplay">R0</div>

        <div class="payment-methods-icons">
            <span>💳 Card</span> • <span>🍎 ApplePay</span> • <span>📱 SamsungPay</span>
        </div>

        <form id="paymentForm">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="email-address" required placeholder="client@example.com">
            </div>
            
            <button type="submit" class="pay-btn" onclick="payWithPaystack(event)">
                Proceed to Secure Pay
            </button>
        </form>

        <p style="font-size: 0.7rem; margin-top: 20px;">🔒 Secured by Paystack. International & Local Cards Accepted.</p>
    </div>

    <script>
        // FOR TESTING: We will grab the total from the URL or local storage
        // If you're using my previous code, it will pass the total here.
        let totalAmount = 12500; // Example: R12,500
        document.getElementById('totalDisplay').innerText = "R" + totalAmount.toLocaleString();

        function payWithPaystack(e) {
            e.preventDefault();

            let email = document.getElementById("email-address").value;
            if (!email) { alert("Please enter your email."); return; }

            let handler = PaystackPop.setup({
                key: 'pk_test_xxxxxxxxxxxxxxxxxxxxxxxx', // REPLACE WITH YOUR PUBLIC KEY
                email: email,
                amount: totalAmount * 100, // Paystack uses cents (R1 = 100 cents)
                currency: "ZAR",
                ref: 'TRENDORA_'+Math.floor((Math.random() * 1000000000) + 1), 
                onClose: function(){
                    alert('Window closed.');
                },
                callback: function(response){
                    alert('Payment successful! Reference: ' + response.reference);
                    // You can redirect to a success page here
                    window.location.href = "success.html";
                }
            });

            handler.openIframe();
        }
    </script>
</body>
</html>
